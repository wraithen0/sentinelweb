# Detects open directory listing on the root or common upload paths.
id: open-directory-listing
info:
  name: "Open directory listing"
  severity: low
  description: |
    A 200 response was returned containing the standard "Index of /"
    banner from a webserver-generated directory listing. Directory
    listings let an attacker enumerate filenames they would otherwise
    have to guess, which speeds up reconnaissance.
  remediation: |
    Disable autoindex in your web server config (nginx:
    `autoindex off;`, Apache: `Options -Indexes`). Add an
    `index.html` to any directory that should be browsable.
  references:
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information
  cwe: 548
  category: information-disclosure
  tags: [exposure, listing, owasp-asvs]

requests:
  - method: GET
    path:
      - "/"
      - "/uploads/"
      - "/files/"
      - "/backups/"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - "<title>Index of /"
        case-insensitive: false
